services:
  nightvault:
    image: ghcr.io/uidcheck/nightvault:latest
    container_name: nightvault
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/nightvault.db
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
